<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="./css/index.css">
    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            window.location.href = "/m";
        }
    </script>

<body>
    <div class="main-area">
        <h1>欢迎来到 <a href="javascript:showNameCard()">Gaoxj</a> 的主页</h1>
        <div class="name-card" id="name-card">
            <img src="https://oss.gaoxj.top/img/bujishibou.png-towebp" alt="头像" class="profile-pic" id="pp"
                name="overdose">
            <script>
                var isNameCardShow = false;

                $("#name-card").hide()
                function showNameCard() {
                    if (isNameCardShow) {
                        isNameCardShow = false;
                        $("#name-card").fadeOut(200)
                    } else {
                        isNameCardShow = true;
                        $("#name-card").fadeIn(200)
                    }
                }

                var temp = Math.random() * 3;
                if (temp <= 1) {
                    $("#pp").attr("src", "https://oss.gaoxj.top/img/bujishibou.png-towebp").attr("name", "overdose")
                } else if (temp > 1 && temp <= 2) {
                    $("#pp").attr("src", "https://oss.gaoxj.top/img/ao.jpg-towebp").attr("name", "koisuru")
                } else {
                    $("#pp").attr("src", "https://oss.gaoxj.top/img/aotomira.jpg-towebp").attr("name", "koisuru")
                }
                $("#pp").click(function () {
                    if (this.getAttribute("name") == "overdose") {
                        window.location.href = "/pp/overdose";
                    } else if (this.getAttribute("name") == "koisuru") {
                        window.location.href = "/pp/koisuru";
                    }
                })
            </script>

            </div>

            </div>
            <div class="introduce">汉语<span class="add">（普通话、西南官话）</span>/English/<span class="jp">日本語</span><br />
